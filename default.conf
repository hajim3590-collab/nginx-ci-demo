server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Page principale
    location / {
        try_files $uri $uri/ =404;
    }

    # Endpoint de santé utilisé par les health checks de la pipeline (Niveau 2)
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }
}
